<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2024-2025 Bizim Hikayemiz ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Yıldızlar arka plan */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }
    }

    /* Ana container */
    .container {
      text-align: center;
      z-index: 10;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Başlık */
    h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      animation: glow 2s infinite;
    }

    @keyframes glow {

      0%,
      100% {
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      }

      50% {
        text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
      }
    }

    /* Alt başlık */
    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: 24px;
      margin-bottom: 40px;
    }

    /* Geri sayım */
    .countdown {
      background: rgba(255, 255, 255, 0.2);
      padding: 30px;
      border-radius: 20px;
      margin: 30px 0;
    }

    .countdown-title {
      color: white;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .countdown-timer {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.3);
      padding: 20px;
      border-radius: 15px;
      min-width: 80px;
    }

    .time-number {
      font-size: 36px;
      font-weight: bold;
      color: white;
      display: block;
    }

    .time-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 5px;
    }

    /* Başla butonu */
    .start-button {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      padding: 20px 60px;
      font-size: 24px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
      transition: all 0.3s;
      margin-top: 30px;
      font-weight: bold;
    }

    .start-button:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(245, 87, 108, 0.6);
    }

    .start-button:active {
      transform: translateY(-2px) scale(1.02);
    }

    /* Kalpler animasyonu */
    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: 30px;
      animation: float 6s infinite;
      opacity: 0;
    }

    @keyframes float {
      0% {
        bottom: -50px;
        opacity: 0;
        transform: translateX(0) rotate(0deg);
      }

      25% {
        opacity: 1;
      }

      50% {
        transform: translateX(20px) rotate(180deg);
      }

      75% {
        opacity: 1;
      }

      100% {
        bottom: 100%;
        opacity: 0;
        transform: translateX(-20px) rotate(360deg);
      }
    }

    /* Müzik kontrolü */
    .music-control {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s;
      z-index: 1000;
    }

    .music-control:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Bilgi notu */
    .info-note {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      color: #667eea;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 14px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }
  </style>
</head>

<body>
  <!-- Yıldızlar -->
  <div class="stars" id="stars"></div>

  <!-- Kalpler -->
  <div class="hearts" id="hearts"></div>

  <!-- Müzik kontrolü -->
  <div class="music-control" id="musicControl" onclick="toggleMusic()">
    🎵
  </div>

  <!-- Bilgi notu -->
  <div class="info-note">
    💡 Kulaklık takar mısın can parem 🎧
  </div>

  <!-- Ana içerik -->
  <div class="container">
    <h1>✨ 2024-2025 ✨</h1>
    <p class="subtitle">Bizim Hikayemiz Cansuyum❤️</p>

    <!-- Geri sayım -->
    <div class="countdown">
      <div class="countdown-title">🎆 Yeni Yıla Kalan Süre 🎆</div>
      <div class="countdown-timer">
        <div class="time-box">
          <span class="time-number" id="days">00</span>
          <span class="time-label">Gün</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="hours">00</span>
          <span class="time-label">Saat</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="minutes">00</span>
          <span class="time-label">Dakika</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="seconds">00</span>
          <span class="time-label">Saniye</span>
        </div>
      </div>
    </div>

    <button class="start-button" onclick="startJourney()">
      💝 Hadi Bas Başlasın Hikayemiz
    </button>
  </div>

  <!-- Ses dosyası (placeholder - kendi müziğini ekle) -->
  <audio id="backgroundMusic" loop>
    <!-- Müzik eklemek için:
        1. Bir .mp3 dosyası bul (romantic music)
        2. Projenin yanına koy
        3. src="music.mp3" olarak değiştir -->
    <source src="music1.mp3" type="audio/mpeg">
  </audio>

  <script>
    /* =============================================
       JAVASCRIPT - DETAYLI AÇIKLAMALAR
       ============================================= */

    // ADIM 1: Yıldızları oluştur
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const starCount = 100; // 100 yıldız oluştur

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';

        // Rastgele pozisyon
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';

        // Rastgele animasyon gecikmesi
        star.style.animationDelay = Math.random() * 3 + 's';

        starsContainer.appendChild(star);
      }
    }

    // ADIM 2: Kalpleri oluştur
    function createHearts() {
      const heartsContainer = document.getElementById('hearts');

      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = '💕';

        // Rastgele yatay pozisyon
        heart.style.left = Math.random() * 100 + '%';

        // Rastgele animasyon süresi
        const duration = 4 + Math.random() * 4; // 4-8 saniye
        heart.style.animationDuration = duration + 's';

        heartsContainer.appendChild(heart);

        // Animasyon bitince kalbi sil
        setTimeout(() => {
          heart.remove();
        }, duration * 1000);

      }, 1000); // Her 1 saniyede bir kalp ekle
    }

    // ADIM 3: Geri sayım timer
    function updateCountdown() {
      // Yeni yılın tarihi (2025, 0 = Ocak, 1 = 1. gün)
      const newYear = new Date(2025, 12, 1, 0, 0, 0);
      const now = new Date();
      const diff = newYear - now; // Milisaniye cinsinden fark

      // Milisaniyeyi gün/saat/dakika/saniyeye çevir
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      // HTML'i güncelle
      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    // Her saniye countdown'u güncelle
    setInterval(updateCountdown, 1000);

    // ADIM 4: Müzik kontrolü
    let isMusicPlaying = false;
    const music = document.getElementById('backgroundMusic');

    function toggleMusic() {
      const musicControl = document.getElementById('musicControl');

      if (isMusicPlaying) {
        // Müziği durdur
        music.pause();
        musicControl.textContent = '🎵';
        isMusicPlaying = false;
      } else {
        // Müziği başlat
        music.play();
        musicControl.textContent = '🔇';
        isMusicPlaying = true;
      }
    }

    // ADIM 5: Yolculuğa başla butonu
    function startJourney() {
      // Müziği başlat
      if (!isMusicPlaying) {
        music.play();
        isMusicPlaying = true;
        document.getElementById('musicControl').textContent = '🔇';
      }

      // Sayfayı fade out yap
      document.body.style.transition = 'opacity 1s';
      document.body.style.opacity = '0';

      // 1 saniye sonra sonraki sayfaya geç
      setTimeout(() => {
        // Gerçek projede buraya:
        window.location.href = 'gallery.html';
      }, 1000);
    }

    // Sayfa yüklenince çalışacaklar
    window.addEventListener('load', function () {
      createStars();
      createHearts();
      updateCountdown();
    });
  </script>
</body>

</html>
